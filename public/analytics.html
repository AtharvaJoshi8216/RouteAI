<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Route AI — Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0f;
      --surface:  #111118;
      --border:   #1e1e2e;
      --border2:  #2a2a3e;
      --text:     #e2e2f0;
      --muted:    #6b6b8a;
      --accent:   #7c6af7;
      --accent2:  #4fd9b3;
      --warn:     #f7a26a;
      --danger:   #f76a6a;
      --mono:     'IBM Plex Mono', monospace;
      --sans:     'Syne', sans-serif;
    }

    html { font-size: 14px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* grid noise texture */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    .shell {
      position: relative;
      z-index: 1;
      max-width: 1500px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border2);
      gap: 24px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .logo-text {
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .logo-text span { color: var(--accent); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .analytics-link {

        text-decoration: none;

        color: #cbd5e1;

        font-family: var(--mono);

        font-size: 0.74rem;

        padding: 8px 14px;

        border-radius: 10px;

        border:
            1px solid rgba(255,255,255,0.08);

        background:
        rgba(255,255,255,0.03);

        transition:
            all 0.2s ease;
    }

    .analytics-link:hover {

        transform: translateY(-2px);

        border-color:
        rgba(124,106,247,0.25);

        box-shadow:
            0 0 20px rgba(124,106,247,0.12);
    }

    .analytics-page {

        margin-top: 28px;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent2);
      box-shadow: 0 0 8px var(--accent2);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-label {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* ── STATS ROW ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
      margin-bottom: 32px;
    }

    @media (max-width: 1100px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 700px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 16px;
      position: relative;
      overflow: hidden;
      transition:
        transform 0.25s ease,
        border-color 0.25s ease,
        box-shadow 0.25s ease;
    }

    .stat-card.primary {

      background:
        linear-gradient(
          180deg,
          rgba(139,92,246,0.16),
          rgba(15,23,42,0.96)
        );

      border-color:
      rgba(139,92,246,0.35);
    }

    .stat-card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow:
        0 12px 30px rgba(0,0,0,0.35),
        0 0 20px rgba(139,92,246,0.10);
    }

    .stat-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.2s;
    }

    .stat-card:hover::after { opacity: 1; }

    .stat-label {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 1.45rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      word-break: break-word;
      font-size: clamp(1.3rem, 2vw, 2rem);
      line-height: 1.1;
    }

    .stat-value.green  { color: var(--accent2); }
    .stat-value.purple { color: var(--accent); }
    .stat-value.orange { color: var(--warn); }
    .stat-value.red    { color: var(--danger); }

    .stat-sub {
      margin-top: 4px;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* ── TWO-COL LAYOUT ── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 16px;
      margin-bottom: 24px;
    }

    

    /* ── PANEL ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 12px;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .panel-action {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--accent);
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.15s;
    }

    .panel-action:hover { background: rgba(124,106,247,0.12); }

    /* ── MODEL BREAKDOWN ── */
    .model-list { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }

    .model-row { display: flex; flex-direction: column; gap: 4px; }

    .model-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .model-name {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text);
    }

    .model-count {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
    }

    .bar-track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s cubic-bezier(0.16,1,0.3,1);
    }

    /* ── LOGS TABLE ── */
    .logs-scroll {
      max-height: 480px;
      overflow-y: auto;
    }

    .logs-scroll::-webkit-scrollbar { width: 4px; }
    .logs-scroll::-webkit-scrollbar-track { background: transparent; }
    .logs-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .log-row {
      display: grid;
      grid-template-columns: 
      90px 
      130px 
      110px 
      90px 
      90px 
      90px 
      minmax(220px, 1fr);

      gap: 18px;
      align-items: center;
      padding: 12px 22px;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.72rem;
      transition: background 0.1s;
      cursor: pointer;
    }

    .log-row:hover { background: rgba(255,255,255,0.02); }
    .log-row.header { color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; cursor: default; font-size: 0.65rem; }
    .log-row.header:hover { background: transparent; }

    .log-row.error { opacity: 0.6; }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 600;
      font-family: var(--mono);
      letter-spacing: 0.02em;
    }

    .badge-live {
      background: rgba(34,197,94,0.15);
      color: #4ade80;
      border: 1px solid rgba(34,197,94,0.25);
    }

    .badge-error {
      background: rgba(239,68,68,0.15);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.25);
    }

    .badge-fallback {
      background: rgba(251,191,36,0.20);
      color: #fbbf24;
      border: 1px solid rgba(251,191,36,0.35);
      box-shadow: 0 0 12px rgba(251,191,36,0.15);
    }

    .badge-cached {
      background: rgba(59,130,246,0.15);
      color: #60a5fa;
      border: 1px solid rgba(59,130,246,0.25);
    }

    .complexity-simple  { color: var(--accent2); }
    .complexity-medium  { color: var(--warn); }
    .complexity-complex { color: var(--danger); }

    .prompt-preview {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      max-width: 260px;
    }

    /* ── DETAIL MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 16px;
      width: 100%;
      max-width: 620px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: var(--surface);
    }

    .modal-title { font-weight: 700; font-size: 0.9rem; }

    .modal-close {
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 1.2rem; line-height: 1;
      padding: 4px; border-radius: 4px;
      transition: color 0.15s;
    }

    .modal-close:hover { color: var(--text); }

    .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }

    .detail-row { display: flex; flex-direction: column; gap: 4px; }

    .detail-label {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .detail-value {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }

    /* ── TEST PANEL ── */
    .test-panel {
      box-shadow:
        0 10px 30px rgba(0,0,0,0.25);

      background:
      linear-gradient(
        180deg,
      rgba(17,17,24,0.96),
      rgba(8,8,14,0.98)
      );
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .test-title {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.02em;
      margin-bottom: 16px;
    }

    .prompt-row {

      display: grid;

      grid-template-columns:
        minmax(0, 1fr)
        110px;

      gap: 12px;

      margin-bottom: 12px;
    }

    .controls-row {

      display: flex;

      gap: 12px;

      flex-wrap: wrap;

      margin-bottom: 16px;
    }

    .small-control {

      width: 180px;

      flex-shrink: 0;
    }

    .test-input {
      flex: 1;
      min-width: 0;
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .test-input:focus { border-color: var(--accent); }

    select.test-input {
      cursor: pointer;
      min-width: 120px;
      flex: 0;
    }

    .test-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-family: var(--sans);
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .test-btn:hover { opacity: 0.9; }
    .test-btn:active { transform: scale(0.97); }
    .test-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .test-result {
      background: 
      linear-gradient(
        180deg,
      rgba(15,23,42,0.95),
      rgba(2,6,23,0.98)
      );

      border:
      1px solid rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 14px;
      font-family: var(--mono);
      font-size: 0.78rem;
      line-height: 1.6;
      min-height: 120px;
      height: auto;
      color: #dbe4ff;
      white-space: pre-wrap;
      word-break: break-word;
      padding-top: 12px;
      max-height: 520px;
      overflow-y: auto;
      scroll-behavior: smooth;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.02),
        0 10px 30px rgba(0,0,0,0.20);

      scrollbar-width: thin;
    }

    .test-result::-webkit-scrollbar {
      width: 6px; 
    }

    .test-result::-webkit-scrollbar-thumb {
      background: rgba(139,92,246,0.4);
      border-radius: 999px;
    }

    .empty-state {

      color: rgba(203,213,225,0.45);

      font-style: italic;
    }

    .test-meta {

      display: flex;

      flex-direction: column;

      gap: 14px;

      margin-top: 14px;

      align-items: flex-start;
    }

    .test-meta-item {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
    }

    .test-meta-item strong { color: var(--accent2); }

    .meta-strip {

      display: flex;

      flex-wrap: wrap;

      gap: 10px;

      margin-top: 14px;
    }

    .meta-chip {

      display: inline-flex;

      align-items: center;

      gap: 6px;

      padding: 8px 12px;

      border-radius: 10px;

      background:
      rgba(255,255,255,0.04);

      border:
        1px solid rgba(255,255,255,0.08);

      font-size: 0.74rem;

      font-family: var(--mono);

      color: #dbe4ff;

      font-weight: 600;
    }

    .meta-chip.success {

      color: #4ade80;

      border-color:
      rgba(74,222,128,0.20);
    }

    .provider-chip,
    .latency-chip,
    .health-chip {

      display: inline-flex;

      align-items: center;

      gap: 8px;

      padding: 8px 14px;

      border-radius: 999px;

      font-size: 0.72rem;

      font-family: var(--mono);

      border:
        1px solid rgba(255,255,255,0.08);

      background:
      rgba(255,255,255,0.03);

      backdrop-filter: blur(10px);

      transition: all 0.2s ease;

      font-weight: 600;
    }

    .provider-chip {

      color: #4fd9b3;

      border-color:
      rgba(79,217,179,0.18);

      box-shadow:
        0 0 18px rgba(79,217,179,0.08);
    }

    .provider-dot {

      width: 8px;

      height: 8px;

      border-radius: 999px;

      background: #4fd9b3;

      box-shadow:
        0 0 12px #4fd9b3;
    }

    .latency-chip {

      color: #e2e8f0;
    }

    .health-chip.stable {

      color: #d8b4fe;

      border-color:
      rgba(216,180,254,0.2);

      background:
      rgba(168,85,247,0.08);
    }

    .health-chip.fallback {

      color: #fbbf24;

      border-color:
      rgba(251,191,36,0.25);

      background:
      rgba(251,191,36,0.08);
    }

    .budget-warning {

      margin-top: 10px;

      padding: 10px 12px;

      border-radius: 8px;

      background:
      rgba(251,191,36,0.12);

      border:
        1px solid rgba(251,191,36,0.25);

      color: #fbbf24;

      font-size: 0.76rem;

      font-weight: 700;
    }

    .budget-stats {

      margin-top: 8px;

      color: #94a3b8;

      font-size: 0.75rem;
    }

    .routing-panel {

      margin-top: 10px;

      padding: 18px 20px;

      border-radius: 12px;

      background:
        linear-gradient(
          180deg,
        rgba(139,92,246,0.10),
        rgba(15,23,42,0.45)
        );

      border:
        1px solid rgba(139,92,246,0.18);

      box-shadow:
        0 8px 24px rgba(0,0,0,0.18);

      backdrop-filter: blur(8px);
    }

    .collapsible-section {

      margin-top: 14px;
    }

    .collapsible-header {

      display: flex;

      align-items: center;

      justify-content: space-between;

      padding: 14px 16px;

      border-radius: 12px;

      background:
      rgba(255,255,255,0.03);

      border:
        1px solid rgba(255,255,255,0.06);

      cursor: pointer;

      transition:
        all 0.2s ease;

      user-select: none;
    }

    .collapsible-header:hover {

      background:
      rgba(255,255,255,0.05);

      border-color:
      rgba(124,106,247,0.22);
    }

    .collapsible-title {

      display: flex;

      align-items: center;

      gap: 10px;

      font-size: 0.82rem;

      font-weight: 700;

      color: #dbe4ff;

      letter-spacing: 0.02em;
    }

    .collapsible-arrow {

      transition:
        transform 0.25s ease;

      color: #8b5cf6;

      font-size: 0.85rem;
    }

    .collapsible-section.open
    .collapsible-arrow {

      transform: rotate(90deg);
    }

    .collapsible-content {

      max-height: 0;

      overflow: hidden;

      opacity: 0;

      transition:
        max-height 0.35s ease,
        opacity 0.25s ease;
    }

    .collapsible-section.open
    .collapsible-content {

      max-height: 1200px;

      opacity: 1;
    }

    .routing-title {

      font-size: 0.88rem;

      font-weight: 800;

      color: #d8c7ff;

      margin-bottom: 14px;

      letter-spacing: 0.04em;

      text-transform: uppercase;
    }

    .routing-list {

      display: flex;

      flex-direction: column;

      gap: 8px;
    }

    .routing-item {

      display: flex;

      align-items: flex-start;

      gap: 10px;

      font-size: 0.80rem;

      color: #dbe4ff;

      line-height: 1.6;

      padding: 4px 0;

      border-bottom:
        1px solid rgba(255,255,255,0.04);
    }

    .routing-item:last-child {

      border-bottom: none;
    }

    .routing-grid {

      display: grid;

      grid-template-columns: 340px 1fr;

      gap: 18px;

      align-items: start;

      margin-top: 16px;
    }

    .routing-grid-left {

      min-width: 0;
    }

    .routing-grid-right {

      min-width: 0;
    }

    @media (max-width: 1100px) {

      .routing-grid {

        grid-template-columns: 1fr;
      }
    }

    .timeline-panel {

        margin-top: 16px;

        padding: 18px 20px;

        border-radius: 12px;

        background:
          linear-gradient(
            180deg,
          rgba(79,217,179,0.06),
          rgba(15,23,42,0.35)
          );

        border:
          1px solid rgba(79,217,179,0.14);

        box-shadow:
          0 8px 24px rgba(0,0,0,0.18);
    }

    .timeline-title {

      font-size: 0.82rem;

      font-weight: 800;

      color: #7dd3fc;

      margin-bottom: 14px;

      text-transform: uppercase;

      letter-spacing: 0.04em;
   }

    .timeline-list {

      display: flex;

      flex-direction: column;

      gap: 14px;

      position: relative;

      padding-left: 8px;
    }

    .timeline-item {

      position: relative;

      display: flex;

      align-items: center;

      justify-content: space-between;

      gap: 14px;

      padding: 0 0 16px 0;

      font-family: var(--mono);

      font-size: 0.76rem;

      opacity: 0;

      transform: translateY(8px);

      animation: timelineReveal 0.45s ease forwards;

      transition:
        transform 0.2s ease,
        background 0.2s ease,
        border-color 0.2s ease;

      backdrop-filter: blur(10px);

      background:
      rgba(255,255,255,0.015);

      border:
        1px solid rgba(255,255,255,0.04);

      padding: 12px 14px;
    }

    .timeline-item::before {

      content: "";

      position: absolute;

      left: 8px;

      top: 22px;

      width: 2px;

      height: calc(100% + 12px);

      background:
        linear-gradient(
          180deg,
        rgba(124,106,247,0.95),
        rgba(79,217,179,0.35)
        );

      box-shadow:
        0 0 14px rgba(124,106,247,0.25);

      animation:
        timelineFlow 2.8s linear infinite;
    }

    .timeline-item::after {

      content: "";

      position: absolute;

      left: 2px;

      top: 8px;

      width: 14px;

      height: 14px;

      border-radius: 999px;

      background:
      rgba(124,106,247,0.18);

      filter: blur(10px);

      opacity: 0.8;

      animation:
        timelineGlow 2.5s infinite;
    }

    .timeline-item:last-child {

      padding-bottom: 0;
    }

    .timeline-item:last-child::before {

      display: none;
    }

    .timeline-left {

      display: flex;

      align-items: center;

      gap: 10px;

      color: #dbeafe;
    }

    .timeline-item:hover {

      background:
      rgba(255,255,255,0.025);

      border-radius: 10px;

      transform: translateX(4px);

      border-color:
      rgba(139,92,246,0.20);
    }

    .timeline-icon {

      width: 18px;

      height: 18px;

      border-radius: 999px;

      display: flex;

      align-items: center;

      justify-content: center;

      font-size: 0.68rem;

      background:
      rgba(124,106,247,0.15);

      border:
        1px solid rgba(124,106,247,0.35);

      box-shadow:
        0 0 12px rgba(124,106,247,0.15);

      flex-shrink: 0;

      position: relative;

      z-index: 2;

      animation:
        timelinePulse 2s infinite;
    }

    .timeline-success {

      background:
      rgba(74,222,128,0.12);

      border:
        1px solid rgba(74,222,128,0.35);

      box-shadow:
        0 0 14px rgba(74,222,128,0.22);

      color: #4ade80;

      position: relative;
    }

    .timeline-success::after {

      content: "";

      position: absolute;

      inset: -4px;

      border-radius: 999px;

      border:
        1px solid rgba(74,222,128,0.35);

      animation:
        liveRing 2s infinite;
    }

    .timeline-cache {

      background:
      rgba(96,165,250,0.12);

      border:
        1px solid rgba(96,165,250,0.35);

      box-shadow:
        0 0 14px rgba(96,165,250,0.22);

      color: #60a5fa;
    }

    .timeline-fallback {

      background:
      rgba(251,191,36,0.12);

      border:
        1px solid rgba(251,191,36,0.35);

      box-shadow:
        0 0 14px rgba(251,191,36,0.22);

      color: #fbbf24;
    }

    .timeline-time {

      display: flex;

      flex-direction: column;

      align-items: flex-end;

      gap: 2px;

      min-width: 78px;
    }

    .timeline-clock {

      color: #cbd5e1;

      font-size: 0.68rem;

      font-weight: 700;

      letter-spacing: 0.03em;
    }

    .timeline-ms {

      color: #64748b;

      font-size: 0.66rem;

      font-weight: 600;
    }

    .routing-bullet {

      color: #8b5cf6;

      font-weight: bold;

      margin-top: 1px;
    }

    /* ── EMPTY / LOADING ── */
    .empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.78rem;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loading-dots::after {
      content: '...';
      animation: dots 1.2s steps(4, end) infinite;
    }

    .loading-wave {
      height: 3px;
      width: 100%;
      border-radius: 999px;

      background:
        linear-gradient(
          90deg,
          transparent,
        #8b5cf6,
          transparent
        );

      background-size: 200% 100%;

      animation: wave 1.2s linear infinite;

      margin-top: 14px;
    }

    @keyframes wave {
      from { background-position: 200% 0; }
      to   { background-position: -200% 0; }
    }

    .streaming-cursor {

      display: inline-block;

      margin-left: 4px;

      color: #8b5cf6;

      font-weight: bold;
  
      animation: blink 0.8s infinite;
    }

    @keyframes blink {

      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.2;
      }

      100% {
        opacity: 1;
      }
    }

    @keyframes timelineFlow {

      0% {

        opacity: 0.5;
      }

      50% {

        opacity: 1;
      }

      100% {

        opacity: 0.5;
      }
    }

    @keyframes timelineGlow {

      0% {

        opacity: 0.3;

        transform: scale(0.8);
      }

      50% {

        opacity: 1;

        transform: scale(1.2);
      }

      100% {

        opacity: 0.3;

        transform: scale(0.8);
      }
    }

    @keyframes timelinePulse {

      0% {
        box-shadow:
          0 0 0 rgba(124,106,247,0.0);
      }

      50% {
        box-shadow:
          0 0 18px rgba(124,106,247,0.35);
      }

      100% {
        box-shadow:
          0 0 0 rgba(124,106,247,0.0);
      }
    }

    @keyframes liveRing {

      0% {

        transform: scale(0.8);

        opacity: 1;
      }

      100% {

        transform: scale(1.8);

        opacity: 0;
      }
    }

    @keyframes timelineReveal {

      to {

        opacity: 1;

        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0% { opacity: 0.2; }
      50% { opacity: 1; }
      100% { opacity: 0.2; }
    }

    .markdown-body {
      color: #d6e2ff;
      line-height: 1.7;
      font-size: 0.82rem;
      max-width: 920px;
      margin: 0 auto;
    }

    .markdown-body p {
      margin-bottom: 12px;
    }

    .markdown-body ul,
    .markdown-body ol {
      padding-left: 22px;
      margin: 10px 0;
    }

    .markdown-body li {
      margin-bottom: 6px;
    }

    .markdown-body pre::before {
      content: "CODE";
      position: absolute;
      top: 8px;
      right: 12px;
      font-size: 0.65rem;
      color: #8b5cf6;
      letter-spacing: 1px;
      font-weight: 700;
    
    }

    .markdown-body pre {
      background: linear-gradient(180deg, #0f172a, #020617);
      border: 1px solid rgba(139, 92, 246, 0.25);
      border-radius: 14px;
      padding: 18px;
      overflow-x: auto;
      margin: 18px 0;
      position: relative;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.02),
        0 10px 30px rgba(0,0,0,0.35);
    }

    .markdown-body pre code {
      color: #e2e8f0;
      font-size: 0.82rem;
      line-height: 1.6;
      font-family: var(--mono);
    }

    .markdown-body code {
      font-family: var(--mono);
      font-size: 0.76rem;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3 {
      margin-top: 18px;
      margin-bottom: 10px;
      color: white;
    }

    .provider-health {

      display: flex;

      gap: 12px;

      align-items: center;

      flex-wrap: wrap;
    }

    .health-pill {

      display: flex;

      align-items: center;

      gap: 10px;

      padding: 8px 14px;

      border-radius: 999px;

      font-family: var(--mono);

      font-size: 0.68rem;

      border:
        1px solid rgba(255,255,255,0.08);

      background:
      rgba(255,255,255,0.03);

      backdrop-filter: blur(12px);

      transition:
        all 0.25s ease;

      position: relative;

      overflow: hidden;
    }

    .health-pill:hover {

      transform: translateY(-2px);

      border-color:
      rgba(124,106,247,0.28);

      box-shadow:
        0 0 20px rgba(124,106,247,0.12);
    }

    .health-dot {

      width: 8px;

      height: 8px;

      border-radius: 999px;

      animation:
        providerPulse 2s infinite;
    }

    .health-good {

      background: #4ade80;

      box-shadow:
        0 0 10px #4ade80;
    }

    .health-warning {

      background: #fbbf24;

      box-shadow:
        0 0 10px #fbbf24;
    }

    .health-bad {

      background: #f87171;

      box-shadow:
        0 0 10px #f87171;
    }

    .provider-metrics {

      display: flex;

      gap: 8px;

      color: #94a3b8;

      font-size: 0.64rem;
    }

    @keyframes providerPulse {

      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }

      100% {
        opacity: 1;
      }
    }

    .charts-grid {

        display: grid;

        grid-template-columns: repeat(2, 1fr);

        gap: 24px;

        margin-top: 32px;
    }

    .provider-section {

        margin-top: 24px;
    }

    .provider-chart-card {

        min-height: 420px;

        display: flex;

        flex-direction: column;

        justify-content: center;

        align-items: center;
    }

    .chart-card {

        position: relative;

        width: 100%;

        min-width: 0;

        height: 400px;

        padding: 20px;

        border-radius: 24px;

        border: 1px solid rgba(124, 92, 255, 0.15);

        background: rgba(10, 12, 30, 0.82);

        overflow: hidden;

        transition:
            transform 0.25s ease,
            border-color 0.25s ease,
            box-shadow 0.25s ease;
    }

    .chart-card:hover {

        transform: translateY(-4px);

        border-color:
            rgba(124,106,247,0.22);

        box-shadow:
            0 16px 40px rgba(0,0,0,0.35),
            0 0 20px rgba(124,106,247,0.08);
    }

    .chart-card.full-width {

        grid-column: span 2;
    }

    .chart-title {

        font-size: 0.82rem;

        font-weight: 700;

        margin-bottom: 20px;

        color: #cbd5e1;

        letter-spacing: 0.02em;
    }

    .chart-card canvas {

        width: 100% !important;

        height: calc(100% - 40px);
    }

    #providerChart {

        max-height: 260px !important;

        width: 100% !important;

        margin: 0 auto;
    }

    @keyframes dots {
      0%, 20%  { content: '.';   }
      40%      { content: '..';  }
      60%, 100%{ content: '...'; }
    }

    @media (max-width: 900px) {

        .two-col { grid-template-columns: 1fr; }

        .prompt-row {

            grid-template-columns: 1fr;
        }

        .test-btn {

            width: 100%;
            box-shadow:
                0 0 20px rgba(124,106,247,0.25);
        }

        .test-btn:hover {
            transform: translateY(-1px);
        }

        .controls-row {

            flex-direction: column;
        }

        .small-control {

            width: 100%;
        }

        .chart-card {

            min-height: 260px;
        }

        .charts-grid {

            grid-template-columns: 1fr;
        }

        .chart-card.full-width {

            grid-column: span 1;
        }

        .stats-grid {

            grid-template-columns: 1fr;
        }

        .provider-chart-card {

            height: 340px;
        }

        .analytics-link {

            width: 100%;
            text-align: center;
        }

        .header-right {

            width: 100%;
        }

        header {

            flex-direction: column;
            align-items: stretch;
        }
    }

  </style>
</head>
<body>

<div class="shell">

  <header>

    <div class="logo">

      <div class="logo-icon">⚡</div>

      <div class="logo-text">
        Route<span>AI</span>
      </div>

    </div>

    <div class="header-right">

      <a
        href="/dashboard.html"
        class="analytics-link"
      >
        ← Dashboard
      </a>

    </div>

  </header>

  <div class="analytics-page">

    <div class="stats-grid">

        <div class="stat-card primary">

        <div class="stat-label">
            Total Requests
        </div>

        <div
            class="stat-value purple"
            id="a-total-requests"
        >
            —
        </div>

    </div>

    <div class="stat-card">

      <div class="stat-label">
        Total Savings
      </div>

      <div
        class="stat-value green"
        id="a-total-savings"
      >
        —
      </div>

    </div>

    <div class="stat-card">

      <div class="stat-label">
        Avg Latency
      </div>

      <div
        class="stat-value orange"
        id="a-avg-latency"
      >
        —
      </div>

    </div>

    <div class="stat-card">

      <div class="stat-label">
        Cache Hit Rate
      </div>

      <div
        class="stat-value purple"
        id="a-cache-rate"
      >
        —
      </div>

    </div>

  </div>

  <div class="charts-grid">

  <div class="chart-card">
    <h3 class="chart-title"> Request Volume </h3>
    <canvas id="requestsChart"></canvas>
  </div>

  <div class="chart-card">
    <h3 class="chart-title"> Savings Over Time </h3>
    <canvas id="savingsChart"></canvas>
  </div>

</div>

<div class="provider-section">

  <div class="chart-card provider-chart-card">

    <h3 class = "chart-title"> Provider Usage </h3>

    <canvas id="providerChart"></canvas>

  </div>

</div>

</div>

</div>

<script>

async function loadAnalytics() {

  try {

    const res =
      await fetch("/api/metrics", {

        headers: {
          "x-api-key": "dev-key-123"
        }

      });

    const data =
      await res.json();

    const stats =
      data.stats || {};

    renderCharts(stats);

    document.getElementById(
      "a-total-requests"
    ).textContent =
      stats.totalRequests ?? 0;

    document.getElementById(
      "a-total-savings"
    ).textContent =
      `$${Number(
        stats.totalSaved ?? 0
      ).toFixed(4)}`;

    document.getElementById(
      "a-avg-latency"
    ).textContent =
      `${stats.avgLatency || 0}ms`;

    document.getElementById(
      "a-cache-rate"
    ).textContent =
      `${stats.cacheHitRate ?? 0}%`;

  } catch (err) {

    console.error(err);

  }

}

loadAnalytics();

function renderCharts(stats) {

  new Chart(
    document.getElementById("requestsChart"),
    {
      type: "line",

      data: {

        labels: [
          "Mon",
          "Tue",
          "Wed",
          "Thu",
          "Fri",
          "Sat",
          "Sun"
        ],

        datasets: [{

          label: "Requests",

          data: [
            4,
            8,
            12,
            18,
            22,
            28,
            stats.totalRequests || 0
          ],

          borderColor: "#8b5cf6",

          backgroundColor:
            "rgba(139,92,246,0.12)",

          tension: 0.4,

          fill: true
        }]
      },

      options: {

        responsive: true,

        maintainAspectRatio: false,

        layout: {
            padding: {
                bottom: 20
            }
        },

        plugins: {

          legend: {
            display: false
          }
        }
      }
    }
  );

  new Chart(
    document.getElementById("savingsChart"),
    {
      type: "bar",

      data: {

        labels: [
          "GPT-4",
          "Claude",
          "Gemini",
          "Cache"
        ],

        datasets: [{

          data: [
            0.04,
            0.03,
            0.02,
            stats.totalSaved || 0
          ],

          backgroundColor: [
            "#8b5cf6",
            "#4fd9b3",
            "#f7a26a",
            "#60a5fa"
          ]
        }]
      },

      options: {

        responsive: true,

        maintainAspectRatio: false,

        layout: {
            padding: {
                bottom: 20
            }
        },

        plugins: {

          legend: {
            display: false
          }
        }
      }
    }
  );

  new Chart(
    document.getElementById("providerChart"),
    {

        type: "doughnut",

        data: {

        labels: [
            "Claude",
            "OpenAI",
            "Gemini"
        ],

        datasets: [{

            data: [62, 28, 10],

            backgroundColor: [
                "#8b5cf6",
                "#4fd9b3",
                "#f7a26a"
            ],

            borderColor: "#0a0a0f",

            borderWidth: 4,

            hoverOffset: 12
        }]
    },

    options: {

      responsive: true,

      maintainAspectRatio: false,

      cutout: "72%",

      radius: "72%",

      plugins: {

        legend: {

          position: "top",

          labels: {

            color: "#cbd5e1",

            padding: 20,

            font: {

              size: 12
            }
          }
        }
      }
    }
  }
);
}

</script>



</body>
